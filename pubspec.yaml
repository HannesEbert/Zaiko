name: zaiko
description: >-
  Zaiko (在庫) — a household food inventory tracker. Track groceries,
  manage expiration dates, and share shopping lists with your household.
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  cupertino_icons: ^1.0.8
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  freezed_annotation: ^3.1.0
  go_router: ^17.3.0
  intl: ^0.20.2
  json_annotation: ^4.11.0
  riverpod_annotation: ^4.0.2
  supabase_flutter: ^2.16.0
  uuid: ^4.5.3

dev_dependencies:
  build_runner: ^2.15.1
  freezed: ^3.2.5
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  json_serializable: ^6.13.0
  riverpod_generator: ^4.0.3

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
