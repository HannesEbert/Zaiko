# Static analysis configuration for Zaiko.
#
# Baseline: flutter_lints (the official recommended set for Flutter apps).
# On top of that we enable strict type-checking modes and a small set of
# additional rules that keep the codebase consistent. See
# docs/adr/0002-tooling-and-static-analysis.md for the reasoning.

include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  exclude:
    - '**/*.g.dart'
    - '**/*.freezed.dart'
    - build/**

linter:
  rules:
    # Consistency
    - prefer_single_quotes
    - directives_ordering
    - require_trailing_commas
    - always_declare_return_types

    # Correctness
    - unawaited_futures
    - avoid_dynamic_calls
    - only_throw_errors
    - cancel_subscriptions

    # Cleanliness
    - prefer_final_locals
    - unnecessary_lambdas
    - unnecessary_parenthesis
