# Configuration for Flutter's gen-l10n localization tooling.
#
# ARB files live in lib/l10n; app_en.arb is the template (source of truth for
# keys). Running `flutter pub get` (with `generate: true` in pubspec) generates
# the AppLocalizations class into lib/l10n/app_localizations.dart.
arb-dir: lib/l10n
template-arb-file: app_en.arb
output-localization-file: app_localizations.dart
output-class: AppLocalizations
nullable-getter: false
